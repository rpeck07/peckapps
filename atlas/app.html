<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas — Student OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #060d1a;
      --bg2:      #0a1525;
      --bg3:      #0d1a2e;
      --border:   #1a3050;
      --border2:  #243d5c;
      --blue:     #38bdf8;
      --blue2:    #0ea5e9;
      --blue-dim: rgba(56,189,248,0.12);
      --gold:     #c9a84c;
      --text:     #e2eaf4;
      --muted:    #7a93b4;
      --muted2:   #4a6080;
      --red:      #f87171;
      --amber:    #fbbf24;
      --green:    #34d399;
      --sidebar-w: 220px;
    }

    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: 'Sora', sans-serif; display: flex; flex-direction: column; }

    /* ── AUTH SCREEN ── */
    #auth-screen {
      position: fixed; inset: 0; z-index: 200;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    #auth-screen.hidden { display: none; }

    .auth-wrap {
      width: 100%; max-width: 400px;
      padding: 0 24px;
      animation: fadeUp 0.5s ease both;
    }
    .auth-logo {
      font-size: 13px; font-weight: 700; letter-spacing: 4px;
      text-transform: uppercase; color: var(--blue);
      margin-bottom: 12px;
    }
    .auth-title {
      font-size: 36px; font-weight: 800; letter-spacing: -1px;
      margin-bottom: 8px; line-height: 1.1;
    }
    .auth-sub { font-size: 14px; color: var(--muted); margin-bottom: 36px; font-weight: 400; }

    .auth-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 18px; padding: 32px;
    }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
    .auth-tab {
      flex: 1; padding: 10px 0; text-align: center;
      font-size: 13px; font-weight: 600; color: var(--muted);
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.2s; margin-bottom: -1px; letter-spacing: 0.5px;
    }
    .auth-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
    .field input {
      width: 100%; padding: 12px 14px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: 'Sora', sans-serif;
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--blue2); }

    .btn-full {
      width: 100%; padding: 13px;
      background: var(--blue2); color: white;
      border: none; border-radius: 10px; font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.3px;
    }
    .btn-full:hover { background: var(--blue); transform: translateY(-1px); }
    .btn-full:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .auth-error {
      color: var(--red); font-size: 13px; margin-top: 12px;
      text-align: center; min-height: 18px;
    }

    /* ── APP LAYOUT ── */
    #app { display: flex; height: 100vh; overflow: hidden; }
    #app.hidden { display: none; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 0;
      position: relative; z-index: 10;
    }
    .sidebar-header {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo { font-size: 18px; font-weight: 800; color: white; letter-spacing: -0.5px; }
    .sidebar-logo span { color: var(--blue); }
    .sidebar-user { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 0.5px; }

    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 9px;
      font-size: 13px; font-weight: 600; color: var(--muted);
      cursor: pointer; transition: all 0.15s; letter-spacing: 0.2px;
      border: 1px solid transparent;
      user-select: none;
    }
    .nav-item:hover { background: var(--bg3); color: var(--text); }
    .nav-item.active { background: var(--blue-dim); color: var(--blue); border-color: rgba(56,189,248,0.15); }
    .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }

    .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }
    .logout-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 9px;
      font-size: 13px; font-weight: 600; color: var(--muted2);
      cursor: pointer; transition: all 0.15s;
      width: 100%; background: none; border: none; font-family: 'Sora', sans-serif;
    }
    .logout-btn:hover { color: var(--red); background: rgba(248,113,113,0.07); }

    /* Main */
    .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    .topbar {
      height: 56px; flex-shrink: 0;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg);
    }
    .topbar-title { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }

    .btn {
      padding: 8px 16px; border-radius: 8px;
      font-size: 12px; font-weight: 700; font-family: 'Sora', sans-serif;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
      border: none;
    }
    .btn-primary { background: var(--blue2); color: white; }
    .btn-primary:hover { background: var(--blue); }
    .btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--blue); color: var(--blue); }
    .btn-danger { background: transparent; border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
    .btn-danger:hover { background: rgba(248,113,113,0.1); }

    .page-content { flex: 1; overflow-y: auto; padding: 28px; }
    .page-content::-webkit-scrollbar { width: 5px; }
    .page-content::-webkit-scrollbar-track { background: transparent; }
    .page-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* PAGES */
    .page { display: none; }
    .page.active { display: block; }

    /* ── DASHBOARD ── */
    .dash-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 22px;
    }
    .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .stat-value { font-size: 30px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
    .stat-value.red { color: var(--red); }
    .stat-value.amber { color: var(--amber); }
    .stat-value.green { color: var(--green); }
    .stat-value.blue { color: var(--blue); }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

    .dash-two-col { display: grid; grid-template-columns: 1.5fr 1fr; gap: 14px; }

    .panel {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 22px;
    }
    .panel-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }

    /* Danger list */
    .danger-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .danger-item:last-child { border-bottom: none; padding-bottom: 0; }
    .danger-score {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
    }
    .danger-score.high { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
    .danger-score.med  { background: rgba(251,191,36,0.12); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
    .danger-score.low  { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.15); }
    .danger-info { flex: 1; min-width: 0; }
    .danger-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .danger-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .zone-pill {
      font-size: 10px; font-weight: 700; padding: 3px 9px;
      border-radius: 999px; letter-spacing: 0.5px; flex-shrink: 0;
    }
    .zone-panic  { background: rgba(248,113,113,0.15); color: var(--red); }
    .zone-crunch { background: rgba(251,191,36,0.12); color: var(--amber); }
    .zone-steady { background: rgba(56,189,248,0.1); color: var(--blue); }
    .zone-safe   { background: rgba(52,211,153,0.1); color: var(--green); }
    .zone-overdue { background: rgba(248,113,113,0.2); color: var(--red); }

    /* Workload bars */
    .workload-day { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .workload-day:last-child { margin-bottom: 0; }
    .workload-date { font-size: 11px; color: var(--muted); width: 72px; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
    .workload-bar-wrap { flex: 1; height: 8px; background: var(--bg2); border-radius: 99px; overflow: hidden; }
    .workload-bar { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
    .workload-hours { font-size: 11px; color: var(--muted); width: 36px; text-align: right; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }

    /* GPA impacts */
    .gpa-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 12px; }
    .gpa-item:last-child { border-bottom: none; }
    .gpa-name { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gpa-delta { font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
    .gpa-delta.pos { color: var(--green); }
    .gpa-delta.neg { color: var(--red); }
    .gpa-projected { font-size: 11px; color: var(--muted); }

    /* ── ASSIGNMENTS PAGE ── */
    .assignments-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .assignments-header h2 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }

    .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .filter-pill {
      padding: 6px 14px; border-radius: 999px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      cursor: pointer; transition: all 0.15s;
      border: 1px solid var(--border); color: var(--muted);
      background: transparent;
      font-family: 'Sora', sans-serif;
    }
    .filter-pill:hover { border-color: var(--blue); color: var(--blue); }
    .filter-pill.active { background: var(--blue-dim); border-color: rgba(56,189,248,0.3); color: var(--blue); }

    .assignments-table { width: 100%; border-collapse: collapse; }
    .assignments-table th {
      text-align: left; padding: 10px 14px;
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted2); border-bottom: 1px solid var(--border);
    }
    .assignments-table td {
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      font-size: 13px; vertical-align: middle;
    }
    .assignments-table tr:last-child td { border-bottom: none; }
    .assignments-table tr:hover td { background: rgba(56,189,248,0.03); }
    .assignments-table tr.completed td { opacity: 0.4; }

    .course-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; flex-shrink: 0; }

    .conf-pip { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 2px; }

    .row-actions { display: flex; gap: 6px; }
    .icon-btn {
      width: 28px; height: 28px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; cursor: pointer; transition: all 0.15s;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted);
    }
    .icon-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
    .icon-btn.danger:hover { border-color: var(--red); color: var(--red); background: rgba(248,113,113,0.08); }
    .icon-btn.success:hover { border-color: var(--green); color: var(--green); background: rgba(52,211,153,0.08); }

    /* ── COURSES PAGE ── */
    .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .course-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 22px;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .course-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .course-card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .course-card-name { font-size: 16px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.3px; margin-top: 8px; }
    .course-card-grade { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin: 12px 0 4px; }
    .course-card-label { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
    .course-card-actions { display: flex; gap: 8px; margin-top: 16px; }

    /* ── MODALS ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(6,13,26,0.85); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 18px; padding: 28px 32px;
      width: 100%; max-width: 480px;
      animation: fadeUp 0.25s ease both;
      max-height: 90vh; overflow-y: auto;
    }
    .modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 20px; letter-spacing: -0.4px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* Form fields in modal */
    .modal .field label { color: var(--muted); }
    .modal .field input, .modal .field select, .modal .field textarea {
      width: 100%; padding: 11px 13px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); font-family: 'Sora', sans-serif;
      font-size: 13px; outline: none; transition: border-color 0.2s;
    }
    .modal .field input:focus, .modal .field select, .modal .field textarea:focus { border-color: var(--blue2); }
    .modal .field select { appearance: none; cursor: pointer; }

    .two-col-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Color picker */
    .color-options { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .color-opt {
      width: 28px; height: 28px; border-radius: 7px;
      cursor: pointer; border: 2px solid transparent;
      transition: all 0.15s;
    }
    .color-opt.selected { border-color: white; transform: scale(1.15); }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 10px; padding: 12px 18px;
      font-size: 13px; font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s ease;
      max-width: 300px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: rgba(52,211,153,0.3); color: var(--green); }
    #toast.error   { border-color: rgba(248,113,113,0.3); color: var(--red); }

    /* Log hours modal */
    .hours-display { font-size: 48px; font-weight: 800; letter-spacing: -2px; text-align: center; color: var(--blue); margin: 20px 0; font-family: 'JetBrains Mono', monospace; }
    .hours-controls { display: flex; align-items: center; justify-content: center; gap: 16px; }
    .hours-ctrl {
      width: 44px; height: 44px; border-radius: 10px;
      background: var(--bg2); border: 1px solid var(--border2);
      color: var(--text); font-size: 20px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .hours-ctrl:hover { border-color: var(--blue); color: var(--blue); }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }
    .empty-state h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 13px; line-height: 1.6; }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 12px; color: var(--muted); font-size: 13px; }
    .spin { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }

    /* Progress bar on assignment */
    .progress-wrap { width: 60px; height: 4px; background: var(--bg2); border-radius: 99px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 6px; }
    .progress-fill { height: 100%; background: var(--blue); border-radius: 99px; }

    /* Scrollbar global */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-logo">Atlas</div>
    <div class="auth-title">Student OS</div>
    <div class="auth-sub">Your academic command center.</div>
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</div>
        <div class="auth-tab" data-tab="register" onclick="switchTab('register')">Create Account</div>
      </div>
      <div class="field">
        <label>Username</label>
        <input id="auth-username" type="text" autocomplete="username" placeholder="your_username" onkeydown="if(event.key==='Enter')authSubmit()" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="auth-password" type="password" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')authSubmit()" />
      </div>
      <button class="btn-full" id="auth-btn" onclick="authSubmit()">Sign In</button>
      <div class="auth-error" id="auth-error"></div>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app" class="hidden">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">At<span>las</span></div>
      <div class="sidebar-user" id="sidebar-username">—</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="nav-icon">🎯</span> Dashboard
      </div>
      <div class="nav-item" data-page="assignments" onclick="navigate('assignments')">
        <span class="nav-icon">📋</span> Assignments
      </div>
      <div class="nav-item" data-page="courses" onclick="navigate('courses')">
        <span class="nav-icon">📚</span> Courses
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">
        <span style="font-size:14px">↩</span> Sign Out
      </button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-right" id="topbar-actions"></div>
    </div>
    <div class="page-content">

      <!-- DASHBOARD -->
      <div class="page active" id="page-dashboard">
        <div id="dash-loading" class="loading"><div class="spin"></div> Loading your data…</div>
        <div id="dash-content" style="display:none"></div>
      </div>

      <!-- ASSIGNMENTS -->
      <div class="page" id="page-assignments">
        <div id="asgn-loading" class="loading"><div class="spin"></div> Loading assignments…</div>
        <div id="asgn-content" style="display:none"></div>
      </div>

      <!-- COURSES -->
      <div class="page" id="page-courses">
        <div id="courses-loading" class="loading"><div class="spin"></div> Loading courses…</div>
        <div id="courses-content" style="display:none"></div>
      </div>

    </div>
  </div>
</div>

<!-- ══ MODALS ══ -->

<!-- Add/Edit Assignment Modal -->
<div class="modal-overlay hidden" id="modal-assignment">
  <div class="modal">
    <h3 id="modal-assignment-title">Add Assignment</h3>
    <div class="field">
      <label>Assignment Name</label>
      <input id="asgn-name" type="text" placeholder="e.g. Calc Midterm" />
    </div>
    <div class="two-col-fields">
      <div class="field">
        <label>Course</label>
        <select id="asgn-course"><option value="">No course</option></select>
      </div>
      <div class="field">
        <label>Weight %</label>
        <input id="asgn-weight" type="number" step="0.1" placeholder="e.g. 20" />
      </div>
    </div>
    <div class="two-col-fields">
      <div class="field">
        <label>Due Date</label>
        <input id="asgn-due" type="date" />
      </div>
      <div class="field">
        <label>Est. Hours</label>
        <input id="asgn-hours" type="number" step="0.5" placeholder="e.g. 6" />
      </div>
    </div>
    <div class="field">
      <label>Confidence (1–5)</label>
      <select id="asgn-confidence">
        <option value="1">1 — I'm cooked 💀</option>
        <option value="2">2 — Shaky 😬</option>
        <option value="3" selected>3 — Okay 😐</option>
        <option value="4">4 — Solid 💪</option>
        <option value="5">5 — Easy ✅</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-assignment')">Cancel</button>
      <button class="btn btn-primary" id="asgn-save-btn" onclick="saveAssignment()">Add Assignment</button>
    </div>
  </div>
</div>

<!-- Log Hours Modal -->
<div class="modal-overlay hidden" id="modal-hours">
  <div class="modal" style="max-width:320px; text-align:center;">
    <h3 id="modal-hours-title">Log Hours</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:8px;" id="modal-hours-sub"></p>
    <div class="hours-display" id="hours-display">1.0</div>
    <div class="hours-controls">
      <button class="hours-ctrl" onclick="changeHours(-0.5)">−</button>
      <span style="font-size:13px;color:var(--muted)">hours</span>
      <button class="hours-ctrl" onclick="changeHours(0.5)">+</button>
    </div>
    <div class="modal-footer" style="justify-content:center;">
      <button class="btn btn-ghost" onclick="closeModal('modal-hours')">Cancel</button>
      <button class="btn btn-primary" onclick="submitLogHours()">Log Hours</button>
    </div>
  </div>
</div>

<!-- Add/Edit Course Modal -->
<div class="modal-overlay hidden" id="modal-course">
  <div class="modal" style="max-width:380px;">
    <h3 id="modal-course-title">Add Course</h3>
    <div class="field">
      <label>Course Name</label>
      <input id="course-name" type="text" placeholder="e.g. Calculus II" />
    </div>
    <div class="field">
      <label>Current Grade (optional)</label>
      <input id="course-grade" type="number" step="0.1" min="0" max="100" placeholder="e.g. 87.5" />
    </div>
    <div class="field">
      <label>Color</label>
      <div class="color-options" id="color-options"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-course')">Cancel</button>
      <button class="btn btn-primary" id="course-save-btn" onclick="saveCourse()">Add Course</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const API = 'https://studentos-nnbw.onrender.com';

// ── State ──
let token = localStorage.getItem('atlas_token') || null;
let username = localStorage.getItem('atlas_username') || null;
let courses = [];
let assignments = [];
let currentPage = 'dashboard';
let editingAssignmentId = null;
let editingCourseId = null;
let logHoursId = null;
let logHoursVal = 1.0;

const COLORS = ['#38bdf8','#0ea5e9','#6366f1','#8b5cf6','#ec4899','#f43f5e','#f97316','#eab308','#22c55e','#10b981','#14b8a6','#64748b'];
let selectedColor = COLORS[0];

// ── Init ──
if (token) showApp();

// ── Auth ──
let authMode = 'login';

function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === mode));
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-error').textContent = '';
}

async function authSubmit() {
  const u = document.getElementById('auth-username').value.trim();
  const p = document.getElementById('auth-password').value;
  const err = document.getElementById('auth-error');
  const btn = document.getElementById('auth-btn');

  if (!u || !p) { err.textContent = 'Please enter username and password.'; return; }

  btn.disabled = true;
  btn.textContent = '…';
  err.textContent = '';

  try {
    const res = await fetch(`${API}/${authMode}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Something went wrong.'; return; }
    token = data.access_token;
    username = u;
    localStorage.setItem('atlas_token', token);
    localStorage.setItem('atlas_username', username);
    showApp();
  } catch(e) {
    err.textContent = 'Network error. Check your connection.';
  } finally {
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
  }
}

function logout() {
  token = null; username = null;
  localStorage.removeItem('atlas_token');
  localStorage.removeItem('atlas_username');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('auth-password').value = '';
}

// ── App ──
function showApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('sidebar-username').textContent = username;
  loadAll();
}

async function loadAll() {
  await Promise.all([loadCourses(), loadAssignments()]);
  renderPage(currentPage);
}

// ── API helpers ──
async function apiFetch(path, opts = {}) {
  const res = await fetch(`${API}${path}`, {
    ...opts,
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) }
  });
  if (res.status === 401) { logout(); return null; }
  if (res.status === 204) return null;
  return res.json();
}

async function loadCourses() {
  const data = await apiFetch('/courses');
  if (data) courses = data;
}

async function loadAssignments() {
  const data = await apiFetch('/assignments');
  if (data) assignments = data;
}

async function loadDashboard() {
  return apiFetch('/dashboard');
}

// ── Navigation ──
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.getElementById('topbar-title').textContent = {dashboard:'Dashboard',assignments:'Assignments',courses:'Courses'}[page];
  renderPage(page);
}

function renderPage(page) {
  if (page === 'dashboard') renderDashboard();
  else if (page === 'assignments') renderAssignments();
  else if (page === 'courses') renderCourses();
  setTopbarActions(page);
}

function setTopbarActions(page) {
  const el = document.getElementById('topbar-actions');
  if (page === 'assignments') {
    el.innerHTML = `<button class="btn btn-primary" onclick="openAddAssignment()">+ Add Assignment</button>`;
  } else if (page === 'courses') {
    el.innerHTML = `<button class="btn btn-primary" onclick="openAddCourse()">+ Add Course</button>`;
  } else {
    el.innerHTML = '';
  }
}

// ── DASHBOARD ──
async function renderDashboard() {
  document.getElementById('dash-loading').style.display = 'flex';
  document.getElementById('dash-content').style.display = 'none';

  const dash = await loadDashboard();
  if (!dash) return;

  document.getElementById('dash-loading').style.display = 'none';
  document.getElementById('dash-content').style.display = 'block';

  const el = document.getElementById('dash-content');

  if (!dash.has_assignments) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🎯</div><h3>No assignments yet</h3><p>Add your first assignment to get started.</p><br><button class="btn btn-primary" onclick="navigate('assignments');setTimeout(openAddAssignment,100)">+ Add Assignment</button></div>`;
    return;
  }

  const forecast = dash.stress_forecast;
  const highRisk = forecast.high_risk_count;
  const workload = dash.workload_next_3_days || [];
  const maxH = Math.max(...workload.map(d => d.hours), 1);

  // Stats row
  const totalActive = assignments.filter(a => !a.completed).length;
  const highDanger = (dash.top || []).filter(t => t.danger_score >= 5.5).length;

  let statsHTML = `<div class="dash-grid">
    <div class="stat-card">
      <div class="stat-label">Active Assignments</div>
      <div class="stat-value blue">${totalActive}</div>
      <div class="stat-sub">across ${courses.length} course${courses.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">High Risk (5 days)</div>
      <div class="stat-value ${highRisk > 0 ? 'red' : 'green'}">${highRisk}</div>
      <div class="stat-sub">${forecast.message}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Today's Hours</div>
      <div class="stat-value ${workload[0]?.hours > 4 ? 'red' : workload[0]?.hours > 2 ? 'amber' : 'green'}">${workload[0]?.hours ?? 0}h</div>
      <div class="stat-sub">estimated workload today</div>
    </div>
  </div>`;

  // Top danger list
  let dangerHTML = `<div class="panel-title">Top Danger Assignments</div>`;
  if (dash.top && dash.top.length) {
    for (const item of dash.top) {
      const scoreClass = item.danger_score >= 6 ? 'high' : item.danger_score >= 4 ? 'med' : 'low';
      const zoneClass = {
        'Panic Zone': 'zone-panic',
        'Crunch Zone': 'zone-crunch',
        'Steady': 'zone-steady',
        'Safe': 'zone-safe',
        'Overdue': 'zone-overdue'
      }[item.zone] || 'zone-steady';
      const hpd = item.hours_per_day != null ? `${item.hours_per_day}h/day` : 'overdue';
      dangerHTML += `
        <div class="danger-item">
          <div class="danger-score ${scoreClass}">${item.danger_score}</div>
          <div class="danger-info">
            <div class="danger-name">${esc(item.name)}</div>
            <div class="danger-meta">${item.risk_label} risk · ${hpd} · Start by: ${item.start_by?.start_by_date ?? '—'}</div>
          </div>
          <div class="zone-pill ${zoneClass}">${item.zone}</div>
        </div>`;
    }
  } else {
    dangerHTML += `<p style="color:var(--muted);font-size:13px;">No assignments to show.</p>`;
  }

  // Workload bars (3 days)
  let workHTML = `<div class="panel-title">Workload Forecast (3 days)</div>`;
  for (const d of workload) {
    const pct = Math.min(100, (d.hours / Math.max(maxH, 6)) * 100);
    const color = d.hours > 4 ? 'var(--red)' : d.hours > 2 ? 'var(--amber)' : 'var(--green)';
    workHTML += `<div class="workload-day">
      <div class="workload-date">${d.date.slice(5)}</div>
      <div class="workload-bar-wrap"><div class="workload-bar" style="width:${pct}%;background:${color}"></div></div>
      <div class="workload-hours">${d.hours}h</div>
    </div>`;
  }

  // GPA impacts
  let gpaHTML = `<div class="panel-title">Grade Impacts</div>`;
  const impacts = (dash.gpa_impacts || []).slice(0, 5);
  if (impacts.length) {
    for (const it of impacts) {
      const sign = it.delta_points >= 0 ? '+' : '';
      const cls = it.delta_points >= 0 ? 'pos' : 'neg';
      gpaHTML += `<div class="gpa-item">
        <div class="gpa-name">${esc(it.name)}</div>
        <div>
          <div class="gpa-delta ${cls}">${sign}${it.delta_points}</div>
          <div class="gpa-projected">→ ${it.projected_grade}</div>
        </div>
      </div>`;
    }
  } else {
    gpaHTML += `<p style="font-size:13px;color:var(--muted)">No impact data.</p>`;
  }

  el.innerHTML = statsHTML + `
    <div class="dash-two-col">
      <div class="panel">${dangerHTML}</div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="panel">${workHTML}</div>
        <div class="panel">${gpaHTML}</div>
      </div>
    </div>`;
}

// ── ASSIGNMENTS ──
let asgnFilter = 'active';

function renderAssignments() {
  const el = document.getElementById('asgn-content');
  document.getElementById('asgn-loading').style.display = 'none';
  el.style.display = 'block';

  const courseMap = Object.fromEntries(courses.map(c => [c.id, c]));

  let filtered = assignments;
  if (asgnFilter === 'active') filtered = assignments.filter(a => !a.completed);
  else if (asgnFilter === 'completed') filtered = assignments.filter(a => a.completed);

  let html = `
    <div class="filter-row">
      <button class="filter-pill ${asgnFilter === 'active' ? 'active' : ''}" onclick="setAsgnFilter('active')">Active</button>
      <button class="filter-pill ${asgnFilter === 'all' ? 'active' : ''}" onclick="setAsgnFilter('all')">All</button>
      <button class="filter-pill ${asgnFilter === 'completed' ? 'active' : ''}" onclick="setAsgnFilter('completed')">Completed</button>
    </div>`;

  if (!filtered.length) {
    html += `<div class="empty-state"><div class="empty-state-icon">📋</div><h3>No assignments here</h3><p>${asgnFilter === 'active' ? 'Add your first assignment to get started.' : 'Nothing to show.'}</p></div>`;
  } else {
    html += `<table class="assignments-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Course</th>
          <th>Due Date</th>
          <th>Weight</th>
          <th>Confidence</th>
          <th>Hours</th>
          <th></th>
        </tr>
      </thead><tbody>`;
    for (const a of filtered) {
      const course = a.courseId ? courseMap[a.courseId] : null;
      const dotColor = course ? course.color : 'var(--muted2)';
      const logged = a.hoursLogged || 0;
      const total = a.estHours || 0;
      const pct = total > 0 ? Math.min(100, (logged / total) * 100) : 0;
      const confPips = [1,2,3,4,5].map(i => `<span class="conf-pip" style="background:${i <= a.confidence ? 'var(--blue)' : 'var(--border)'}"></span>`).join('');
      const daysLeft = daysUntil(a.dueDate);
      const dueCls = daysLeft < 0 ? 'color:var(--red)' : daysLeft <= 3 ? 'color:var(--amber)' : '';

      html += `<tr class="${a.completed ? 'completed' : ''}">
        <td style="font-weight:700">${esc(a.name)}</td>
        <td><span class="course-dot" style="background:${dotColor}"></span>${course ? esc(course.name) : '<span style="color:var(--muted2)">—</span>'}</td>
        <td><span style="${dueCls};font-family:'JetBrains Mono',monospace;font-size:12px">${a.dueDate || '—'}</span>${daysLeft >= 0 && !a.completed ? `<span style="font-size:10px;color:var(--muted);margin-left:6px">${daysLeft}d</span>` : ''}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${a.weightPercent}%</td>
        <td>${confPips}</td>
        <td>
          <span style="font-family:'JetBrains Mono',monospace;font-size:12px">${logged}/${total}h</span>
          <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
        </td>
        <td>
          <div class="row-actions">
            ${!a.completed ? `<button class="icon-btn" title="Log hours" onclick="openLogHours('${a.id}','${esc(a.name)}',${total},${logged})">⏱</button>` : ''}
            <button class="icon-btn" title="Edit" onclick="openEditAssignment('${a.id}')">✏️</button>
            ${!a.completed ? `<button class="icon-btn success" title="Mark complete" onclick="completeAssignment('${a.id}')">✓</button>` : ''}
            <button class="icon-btn danger" title="Delete" onclick="deleteAssignment('${a.id}')">✕</button>
          </div>
        </td>
      </tr>`;
    }
    html += `</tbody></table>`;
  }

  el.innerHTML = html;
}

function setAsgnFilter(f) {
  asgnFilter = f;
  renderAssignments();
}

function daysUntil(dateStr) {
  if (!dateStr) return 999;
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(dateStr + 'T00:00:00');
  return Math.round((due - today) / 86400000);
}

// ── COURSES ──
function renderCourses() {
  const el = document.getElementById('courses-content');
  document.getElementById('courses-loading').style.display = 'none';
  el.style.display = 'block';

  if (!courses.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📚</div><h3>No courses yet</h3><p>Add your courses to organize assignments and track grades.</p></div>`;
    return;
  }

  let html = `<div class="courses-grid">`;
  for (const c of courses) {
    const asgnCount = assignments.filter(a => a.courseId === c.id && !a.completed).length;
    const gradeDisplay = c.currentGrade != null ? `${c.currentGrade}%` : '—';
    html += `<div class="course-card">
      <div class="course-card-accent" style="background:${c.color}"></div>
      <div class="course-card-name">${esc(c.name)}</div>
      <div class="course-card-grade" style="color:${c.color}">${gradeDisplay}</div>
      <div class="course-card-label">${c.currentGrade != null ? 'Current Grade' : 'Grade not set'}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px">${asgnCount} active assignment${asgnCount !== 1 ? 's' : ''}</div>
      <div class="course-card-actions">
        <button class="btn btn-ghost" style="font-size:11px;padding:6px 12px" onclick="openEditCourse('${c.id}')">Edit</button>
        <button class="btn btn-danger" style="font-size:11px;padding:6px 12px" onclick="deleteCourse('${c.id}')">Delete</button>
      </div>
    </div>`;
  }
  html += `</div>`;
  el.innerHTML = html;
}

// ── ASSIGNMENT MODAL ──
function openAddAssignment() {
  editingAssignmentId = null;
  document.getElementById('modal-assignment-title').textContent = 'Add Assignment';
  document.getElementById('asgn-save-btn').textContent = 'Add Assignment';
  document.getElementById('asgn-name').value = '';
  document.getElementById('asgn-weight').value = '';
  document.getElementById('asgn-due').value = '';
  document.getElementById('asgn-hours').value = '';
  document.getElementById('asgn-confidence').value = '3';
  populateCourseSelect();
  openModal('modal-assignment');
}

function openEditAssignment(id) {
  const a = assignments.find(x => x.id === id);
  if (!a) return;
  editingAssignmentId = id;
  document.getElementById('modal-assignment-title').textContent = 'Edit Assignment';
  document.getElementById('asgn-save-btn').textContent = 'Save Changes';
  document.getElementById('asgn-name').value = a.name;
  document.getElementById('asgn-weight').value = a.weightPercent;
  document.getElementById('asgn-due').value = a.dueDate;
  document.getElementById('asgn-hours').value = a.estHours;
  document.getElementById('asgn-confidence').value = a.confidence;
  populateCourseSelect(a.courseId);
  openModal('modal-assignment');
}

function populateCourseSelect(selectedId = null) {
  const sel = document.getElementById('asgn-course');
  sel.innerHTML = `<option value="">No course</option>`;
  for (const c of courses) {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    if (c.id === selectedId) opt.selected = true;
    sel.appendChild(opt);
  }
}

async function saveAssignment() {
  const name = document.getElementById('asgn-name').value.trim();
  if (!name) { toast('Assignment name required', 'error'); return; }

  const body = {
    name,
    weightPercent: parseFloat(document.getElementById('asgn-weight').value) || 0,
    dueDate: document.getElementById('asgn-due').value,
    estHours: parseFloat(document.getElementById('asgn-hours').value) || 0,
    confidence: parseInt(document.getElementById('asgn-confidence').value),
    courseId: document.getElementById('asgn-course').value || null,
  };

  const btn = document.getElementById('asgn-save-btn');
  btn.disabled = true;

  let data;
  if (editingAssignmentId) {
    data = await apiFetch(`/assignments/${editingAssignmentId}`, { method: 'PATCH', body: JSON.stringify(body) });
    if (data !== null) {
      const idx = assignments.findIndex(a => a.id === editingAssignmentId);
      if (idx >= 0) assignments[idx] = { ...assignments[idx], ...body };
      toast('Assignment updated ✓', 'success');
    }
  } else {
    data = await apiFetch('/assignments', { method: 'POST', body: JSON.stringify(body) });
    if (data) { assignments.unshift(data); toast('Assignment added ✓', 'success'); }
  }

  btn.disabled = false;
  closeModal('modal-assignment');
  renderAssignments();
  if (currentPage === 'dashboard') renderDashboard();
}

async function completeAssignment(id) {
  await apiFetch(`/assignments/${id}/complete`, { method: 'POST' });
  const a = assignments.find(x => x.id === id);
  if (a) a.completed = true;
  toast('Marked complete ✓', 'success');
  renderAssignments();
  if (currentPage === 'dashboard') renderDashboard();
}

async function deleteAssignment(id) {
  if (!confirm('Delete this assignment?')) return;
  await apiFetch(`/assignments/${id}`, { method: 'DELETE' });
  assignments = assignments.filter(a => a.id !== id);
  toast('Assignment deleted', 'success');
  renderAssignments();
  if (currentPage === 'dashboard') renderDashboard();
}

// ── LOG HOURS ──
function openLogHours(id, name, total, logged) {
  logHoursId = id;
  logHoursVal = 1.0;
  document.getElementById('modal-hours-title').textContent = 'Log Hours';
  document.getElementById('modal-hours-sub').textContent = `${name} · ${logged}/${total}h logged`;
  document.getElementById('hours-display').textContent = '1.0';
  openModal('modal-hours');
}

function changeHours(delta) {
  logHoursVal = Math.max(0.5, Math.round((logHoursVal + delta) * 10) / 10);
  document.getElementById('hours-display').textContent = logHoursVal.toFixed(1);
}

async function submitLogHours() {
  if (!logHoursId) return;
  const data = await apiFetch(`/assignments/${logHoursId}/log-hours`, {
    method: 'POST', body: JSON.stringify({ hours: logHoursVal })
  });
  if (data) {
    const a = assignments.find(x => x.id === logHoursId);
    if (a) a.hoursLogged = data.hours_logged;
    toast(`${logHoursVal}h logged ✓`, 'success');
    closeModal('modal-hours');
    renderAssignments();
    if (currentPage === 'dashboard') renderDashboard();
  }
}

// ── COURSE MODAL ──
function buildColorPicker() {
  const wrap = document.getElementById('color-options');
  wrap.innerHTML = '';
  for (const c of COLORS) {
    const d = document.createElement('div');
    d.className = 'color-opt' + (c === selectedColor ? ' selected' : '');
    d.style.background = c;
    d.onclick = () => { selectedColor = c; buildColorPicker(); };
    wrap.appendChild(d);
  }
}

function openAddCourse() {
  editingCourseId = null;
  selectedColor = COLORS[0];
  document.getElementById('modal-course-title').textContent = 'Add Course';
  document.getElementById('course-save-btn').textContent = 'Add Course';
  document.getElementById('course-name').value = '';
  document.getElementById('course-grade').value = '';
  buildColorPicker();
  openModal('modal-course');
}

function openEditCourse(id) {
  const c = courses.find(x => x.id === id);
  if (!c) return;
  editingCourseId = id;
  selectedColor = c.color;
  document.getElementById('modal-course-title').textContent = 'Edit Course';
  document.getElementById('course-save-btn').textContent = 'Save Changes';
  document.getElementById('course-name').value = c.name;
  document.getElementById('course-grade').value = c.currentGrade ?? '';
  buildColorPicker();
  openModal('modal-course');
}

async function saveCourse() {
  const name = document.getElementById('course-name').value.trim();
  if (!name) { toast('Course name required', 'error'); return; }
  const gradeVal = document.getElementById('course-grade').value;
  const currentGrade = gradeVal !== '' ? parseFloat(gradeVal) : null;
  const body = { name, color: selectedColor, currentGrade };

  const btn = document.getElementById('course-save-btn');
  btn.disabled = true;

  if (editingCourseId) {
    await apiFetch(`/courses/${editingCourseId}`, { method: 'PATCH', body: JSON.stringify(body) });
    const idx = courses.findIndex(c => c.id === editingCourseId);
    if (idx >= 0) courses[idx] = { ...courses[idx], ...body };
    toast('Course updated ✓', 'success');
  } else {
    const data = await apiFetch('/courses', { method: 'POST', body: JSON.stringify(body) });
    if (data) courses.push(data);
    toast('Course added ✓', 'success');
  }

  btn.disabled = false;
  closeModal('modal-course');
  renderCourses();
}

async function deleteCourse(id) {
  if (!confirm('Delete this course? Assignments will be unlinked.')) return;
  await apiFetch(`/courses/${id}`, { method: 'DELETE' });
  courses = courses.filter(c => c.id !== id);
  assignments.forEach(a => { if (a.courseId === id) a.courseId = null; });
  toast('Course deleted', 'success');
  renderCourses();
}

// ── Modal helpers ──
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.add('hidden');
  }
});

// ── Toast ──
let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2800);
}

// ── Util ──
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
